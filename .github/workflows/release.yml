name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: verify trigger ref is a tag
        run: |
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "::error::Release workflow must run on a tag ref. Got ref_type=${{ github.ref_type }} ref=${{ github.ref }}"
            exit 1
          fi

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.13"

      - name: verify tag matches pyproject version
        run: |
          tag="${{ github.ref_name }}"
          tag_version="${tag#v}"
          proj_version=$(uv run --no-project python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag_version" != "$proj_version" ]; then
            echo "::error::Tag $tag (=$tag_version) does not match pyproject version $proj_version"
            exit 1
          fi
          echo "Tag $tag matches pyproject version $proj_version"

      - name: build
        run: uv build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 14
          if-no-files-found: error

  pypi-publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chunkhound-index-compactor
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: publish via Trusted Publisher (OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: create GitHub release
    needs: pypi-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          make_latest: "true"
          generate_release_notes: false
          # Release notes are intentionally not auto-generated; edit the
          # release on GitHub after the workflow completes.
          files: |
            dist/*.whl
            dist/*.tar.gz
